# ═══════════════════════════════════════════════════════════════════════════════
# GitHub Pages — Deploy workflow
#
# Triggers: every push to `main` and manual workflow_dispatch
#
# Custom domain:
#   1. Register a domain and point it at GitHub Pages (CNAME / A-record).
#   2. Uncomment the CNAME line in the "Configure Pages" step below.
#   3. Replace "your-custom-domain.com" with your actual domain.
#   4. Delete (or leave empty) the `basePath` in next.config.mjs
#      when using a custom domain — it is only needed for the default
#      *.github.io/<repo-name> URL.
# ═══════════════════════════════════════════════════════════════════════════════

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Grant GITHUB_TOKEN the permissions required for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; do not cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --ci --passWithNoTests

      - name: Build static site
        run: npm run build
        env:
          # GITHUB_PAGES=true enables the /dkeramik basePath in next.config.mjs.
          GITHUB_PAGES: 'true'
          # Set CUSTOM_DOMAIN=true when serving from a custom domain so that
          # the basePath prefix is omitted (site lives at the domain root).
          CUSTOM_DOMAIN: 'false'

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  # ── Deploy ───────────────────────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
